spring.application.name=ApiGateWay
server.port=8888

#Credenciales
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

jwt.secret=clave_super_segura_de_mas_de_64_bytes_de_longitud_esto_es_necesario_para_HS512

# Variables de entorno para URLs de microservicios en Render
# El formato ${VARIABLE:defecto} usa la variable de la nube, y si no existe, usa el localhost
URL_MICROSERVICIO_USUARIOS=${URL_USUARIOS_API:http://localhost:8080}
URL_MICROSERVICIO_PUBLICACIONES=${URL_PUBLICACIONES_API:http://localhost:8085}


# CREDENCIALES DE BASE DE DATOS Y SEGURIDAD
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

jwt.secret=clave_super_segura_de_mas_de_64_bytes_de_longitud_esto_es_necesario_para_HS512

#Prevencion de que las respuestas en la nube se compriman
server.compression.enabled=false


# Redireccion hacia la API de usuarios y publicaciones, con URLs dinámicas para Render

# --- BLOQUE DE USUARIOS (Todos apuntan al puerto 8080 de forma dinámica) ---
services.usuarios.base-url=${URL_MICROSERVICIO_USUARIOS}
services.usuarios.base-path=/api/usuariosApi

services.regiones.base-url=${URL_MICROSERVICIO_USUARIOS}
services.regiones.base-path=/api/regionesApi

services.comunas.base-url=${URL_MICROSERVICIO_USUARIOS}
services.comunas.base-path=/api/comunasApi

services.sexousuario.base-url=${URL_MICROSERVICIO_USUARIOS}
services.sexousuario.base-path=/api/sexosApi

services.oficio.base-url=${URL_MICROSERVICIO_USUARIOS}
services.oficio.base-path=/api/oficiosApi

services.tiposusuario.base-url=${URL_MICROSERVICIO_USUARIOS}
services.tiposusuario.base-path=/api/tiposUsuarioApi

services.perfiles.base-url=${URL_MICROSERVICIO_USUARIOS}
services.perfiles.base-path=/api/perfilesApi

services.chat.base-url=${URL_MICROSERVICIO_USUARIOS}
services.chat.base-path=/api/chatApi

services.participantes.chat.base-url=${URL_MICROSERVICIO_USUARIOS}
services.participantes.chat.base-path=/api/participantes-chatApi

services.mensajes.chat.base-url=${URL_MICROSERVICIO_USUARIOS}
services.mensajes.chat.base-path=/api/mensajes-chatApi

services.usuarios.bloqueados.base-url=${URL_MICROSERVICIO_USUARIOS}
services.usuarios.bloqueados.base-path=/api/usuarios-bloqueadosApi

services.tipos.trabajo.base-url=${URL_MICROSERVICIO_USUARIOS}
services.tipos.trabajo.base-path=/api/tipos-trabajoApi

services.medios.pago.base-url=${URL_MICROSERVICIO_USUARIOS}
services.medios.pago.base-path=/api/medios-pagoApi

services.confirmacion.lectura.base-url=${URL_MICROSERVICIO_USUARIOS}
services.confirmacion.lectura.base-path=/api/confirmacion-transaccionApi

services.denuncias.base-url=${URL_MICROSERVICIO_USUARIOS}
services.denuncias.base-path=/api/denunciasApi

services.tipos.denuncia.base-url=${URL_MICROSERVICIO_USUARIOS}
services.tipos.denuncia.base-path=/api/tipos-denunciaApi

services.tipos.contenido.denunciado.base-url=${URL_MICROSERVICIO_USUARIOS}
services.tipos.contenido.denunciado.base-path=/api/tipos-contenido-denunciadoApi

# --- WEBSOCKETS (También van al microservicio de usuarios) ---
services.mensajes.websocket.base-url=${URL_MICROSERVICIO_USUARIOS}
services.mensajes.websocket.base-path=/ws-chat

services.general.websocket.base-url=${URL_MICROSERVICIO_USUARIOS}
services.general.websocket.base-path=/ws-api


# --- BLOQUE DE PUBLICACIONES (Todos apuntan al puerto 8085 de forma dinámica) ---
services.publicaciones.base-url=${URL_MICROSERVICIO_PUBLICACIONES}
services.publicaciones.base-path=/api/publicacionesApi

services.comentarios.base-url=${URL_MICROSERVICIO_PUBLICACIONES}
services.comentarios.base-path=/api/comentarios

services.resenias.base-url=${URL_MICROSERVICIO_PUBLICACIONES}
services.resenias.base-path=/api/reseniasApi

services.respuestas.resenias.base-url=${URL_MICROSERVICIO_PUBLICACIONES}
services.respuestas.resenias.base-path=/api/respuestasReseniasApi

services.fotos.base-url=${URL_MICROSERVICIO_PUBLICACIONES}
services.fotos.base-path=/api/fotos


# CONFIGURACIÓN MULTIPART (CORREGIDA)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Configuración para permitir subida de archivos (Multipart)

spring.servlet.multipart.enabled=false
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
