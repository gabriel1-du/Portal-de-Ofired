# ===============================================
# == Propiedades para el Entorno de Pruebas (Test) ==
# ===============================================
# Este archivo es cargado automáticamente por Spring Boot cuando se ejecutan tests
# con el perfil "test" activado (@ActiveProfiles("test")).

# -----------------------------------------------
# 1. Configuración de la Base de Datos H2 en Memoria
# -----------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -----------------------------------------------
# 2. Configuración de JPA/Hibernate para H2
# -----------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# -----------------------------------------------
# 3. Sobrescritura de Seguridad y Variables de Entorno (El arreglo al error)
# -----------------------------------------------
# Aquí le damos valores "de mentira" a las variables que Spring Boot 
# espera encontrar en el archivo .env, para que no lance la excepción 
# "Could not resolve placeholder".

# Contraseñas y usuarios de la base de datos (reemplaza 'PASSWORD' si tu variable se llama distinto)
PASSWORD=password_falso_para_tests
DB_USER=usuario_falso_para_tests
USER_NAME=usuario_falso_para_tests

# Si tienes otras variables en tu .env, debes declararlas aquí también. 
# Por ejemplo, si usas JWT, probablemente tengas estas:
JWT_SECRET=una_clave_secreta_muy_larga_falsa_para_que_funcione_el_test_123
JWT_EXPIRATION=86400000

# Y cualquier otra variable que uses en tu código:
# MI_OTRA_VARIABLE=valor_de_prueba