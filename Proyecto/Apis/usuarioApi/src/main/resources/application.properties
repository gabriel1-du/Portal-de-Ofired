spring.application.name=usuarioApi

#Credenciales
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Credenciales de seguridad para el usuario en memoria (cargadas desde .env)
spring.security.user.name=${USER_NAME}
spring.security.user.password=${PASSWORD}

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG

#Credenciales de subida de imagen (Storage)
minio.endpoint=${MINIO_ENDPOINT}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET_NAME}

# Vincular la URL pública del storage en la nube
minio.public-url=${MINIO_PUBLIC_URL}


# Configuración de límites de tamaño para carga de archivos multimedia
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}